##*******************************************************************
## Randolph Ledesma tmux configuration
## https://gitlab.com/randop/workstation/-/blob/main/.tmux.conf
##
## CHANGELOG:
##    Mar 25, 2026 -> Enhancements, vi inspired
##    Oct 11, 2025 -> Basic implementation
##*******************************************************************

# Start index to 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

#--------------------------------------------------------------------
# Status bar:
#--------------------------------------------------------------------
set -g status-style "bg=default,fg=default"
set -g status-left " "
setw -g window-status-current-style "fg=black,bg=white,bold"
# IPv4 address
set -g status-right "#[fg=colour17,bg=yellow] #H{#S}<#(ip route get 1 | awk '{print $7}' | head -n1)>"

#--------------------------------------------------------------------
# Themes and Styles:
#--------------------------------------------------------------------
# Use tmux-256color inside tmux (good for italics + underlines too)
set -g default-terminal "tmux-256color"
# Tell tmux that the outer terminal supports truecolor
set -as terminal-features ",xterm-256color:RGB"
# Alternative/wider version that often works even better:
# set -as terminal-features ",*:RGB"

# VI mode everywhere (copy mode, status line, etc.)
#setw -g mode-keys vi
#set -g status-keys vi

# Faster escape time
set -sg escape-time 10

# Unbind default prefix
unbind C-b

# Use Ctrl + Space
set -g prefix C-Space
bind C-Space send-prefix

# Optional: also allow Ctrl + ` (backtick)
# set -g prefix 'C-`'
# bind 'C-`' send-prefix

# Optional: also allow Ctrl + a
# set -g prefix C-a
# bind C-a send-prefix

#--------------------------------------------------------------------
# Key mappings:
#--------------------------------------------------------------------

# Create new window (Default: Prefix + c)
bind n new-window

# New window (t for "tab" or "terminal")
bind t new-window -c "#{pane_current_path}"

# Go to next/previous window
#bind h previous-window
#bind l next-window

# VI Smart pane switching:
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Kill current window
bind x kill-window

# Hot config reload
bind R source-file ~/.tmux.conf \; display-message "tmux.conf (✓)"

# Split panes like Vim (:vsplit / :split) — | for vertical, - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'


# Maximize / restore current pane
bind m resize-pane -Z

# Resize panes with repeatable Capital HJKL (hold Prefix and repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Jump to last window
bind z last-window

# Enter copy mode
bind v copy-mode

# Synchronize panes (send input to all panes)
bind S set-window-option synchronize-panes

# Break pane into new window (moving a split out)
bind b break-pane

# Join pane
bind J command-prompt -p "Join pane to:" "join-pane -t '%%'"

# List all key bindings (help) — Prefix + ?
bind ? list-keys
